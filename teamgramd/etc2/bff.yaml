Name: bff.bff
ListenOn: 0.0.0.0:20010
Etcd:
  Hosts:
    - etcd:2379
  Key: bff.bff
Timeout: 0
Log:
  ServiceName: bff.bff
  #Mode: file
  #Path: ../logs/bff
  Level: debug
#监控
Prometheus:
  Host: 0.0.0.0
  Port: 20011
  Path: /metrics
#链路追踪
Telemetry:
  Name: bff.bff
  Endpoint: http://jaeger:14268/api/traces
  Sampler: 1.0
  Batcher: jaeger
  
KV:
  - Host: redis:6379

Code:
  Name: "none"
  SendCodeUrl: ""
  VerifyCodeUrl: ""
  Key: ""
  Secret: ""
  RegionId: ""

BizServiceClient:
  Etcd:
    Hosts:
      - etcd:2379
    Key: service.biz_service
AuthSessionClient:
  Etcd:
    Hosts:
      - etcd:2379
    Key: service.authsession
MediaClient:
  Etcd:
    Hosts:
      - etcd:2379
    Key: service.media
  Timeout: 0
IdgenClient:
  Etcd:
    Hosts:
      - etcd:2379
    Key: service.idgen
MsgClient:
  Etcd:
    Hosts:
      - etcd:2379
    Key: messenger.msg
  Timeout: 0
DfsClient:
  Etcd:
    Hosts:
      - etcd:2379
    Key: service.dfs
  Timeout: 0
StatusClient:
  Etcd:
    Hosts:
      - etcd:2379
    Key: service.status

SyncClient:
  Topic:   "Sync-T"
  Brokers:
    - kafka:9092

VoipCallConfigJSON: '{"udp_p2p":true,"udp_reflector":true}'
VoipRelayEndpoints:
  - Id: 1
    # Ip and Password are filled automatically by start-server (.bat/.sh)
    # from the public address and the generated TURN secret. Do not edit by hand.
    Ip: 127.0.0.1
    Ipv6: ""
    Port: 3478
    PeerTag: "00112233445566778899aabbccddeeff"
    Tcp: false
    Turn: true
    Stun: true
    Username: "owpengram"
    Password: "__TURN_SECRET__"