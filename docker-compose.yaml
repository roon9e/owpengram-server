services:
  teamgram:
    build: .
    restart: always
    ports:
      - "10443:10443"
      - "11443:11443"
      - "20450:20450"
      - "20010:20010"
      - "20020:20020"
      - "20640:20640"
      - "20110:20110"
      - "5222:5222"
      - "8801:8801"
      - "20660:20660"
      - "20650:20650"
      - "20030:20030"
      - "20120:20120"
      - "20670:20670"
      - "20420:20420"
    networks:
      - teamgram_net

  # TURN/STUN relay for global voice/video calls (P2P fails behind NAT).
  # PUBLIC_IP and TURN_SECRET are provided via the .env file written by the
  # start-server script. On a Linux host, "network_mode: host" is more
  # efficient; on Docker Desktop (Windows/Mac) the published ports below are
  # used together with --external-ip so relayed media reaches remote clients.
  coturn:
    image: coturn/coturn:latest
    restart: always
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "49160-49200:49160-49200/udp"
    command:
      - -n
      - --listening-port=3478
      - --min-port=49160
      - --max-port=49200
      - --realm=owpengram
      - --lt-cred-mech
      - --fingerprint
      - --no-tls
      - --no-dtls
      - --no-cli
      - --external-ip=${PUBLIC_IP:-127.0.0.1}
      - --user=owpengram:${TURN_SECRET:-changeme}
    networks:
      - teamgram_net

networks:
  teamgram_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
